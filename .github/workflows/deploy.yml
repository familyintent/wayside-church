name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Refreshes build-time content like the latest YouTube teaching even when no site files change.
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Astro site
        run: pnpm build

      - name: Run SEO audit
        run: pnpm seo:audit

      - name: Run automation audit
        run: pnpm automation:audit

      - name: Run performance audit
        run: pnpm performance:audit

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist
          include-hidden-files: true

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0

  notify-indexnow:
    name: Notify IndexNow
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Submit sitemap URLs to IndexNow
        run: node scripts/submit-indexnow.mjs
        env:
          INDEXNOW_SITE_URL: https://wayside.church
          INDEXNOW_KEY: 5ea8c2e9256b462dbad69ce5b252e339
          INDEXNOW_ENDPOINT: https://api.indexnow.org/indexnow
