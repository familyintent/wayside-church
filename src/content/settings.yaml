contactPage:
  title: "Contact us"
  intro: "Find the address, phone number, Sunday details, and a simple way to save the gathering to your calendar."
  visitCopy: "When you join one of our worship gatherings, you may find it a little different than a traditional worship service. You will find worship, Scripture, prayer, fellowship, and people glad to meet you."
  faq:
    - question: "What should I expect when I visit for the first time?"
      answer: "You will find a warm and welcoming community, worship, Bible teaching, and an atmosphere where you can connect with others. There is usually time for fellowship before and after the gathering."
    - question: "Do I need to dress a certain way?"
      answer: "Come as you are. Some people dress casually, some dress more formally, and our focus is worshiping Jesus together."
    - question: "Can I attend if I am not a Christian?"
      answer: "Absolutely. Wayside welcomes everyone regardless of faith background, and we are glad to answer honest questions."
    - question: "What is the church schedule?"
      answer: "Coffee and Discipleship begins Sundays at 9:00 AM, and Sunday worship begins at 10:00 AM."
    - question: "Can I share a prayer request?"
      answer: "Yes. Call us or talk with one of our leaders on Sunday. We would be honored to pray with you."

givingPage:
  title: "Give to Wayside Church"
  intro: "Giving is one way our church family supports worship, ministry, care, and mission in Charlton and beyond."
  body: "Thank you for supporting worship, care, and ministry through Wayside Church."

newsletterPage:
  title: "Stay connected"
  intro: "Subscribe to receive Wayside updates, announcements, ministry rhythms, and next steps."
