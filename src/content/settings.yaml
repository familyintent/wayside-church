      questions:
        - question: "What time is Sunday Worship at Wayside Church?"
          answer: "Sunday Worship begins at 10:00 AM. Coffee and Discipleship begins at 9:00 AM."
        - question: "Where is Wayside Church located?"
          answer: "Wayside Church gathers at 6 Haggerty Rd, Charlton, MA 01507."
        - question: "Do I need to sign up before I come?"
          answer: "No. You can simply come on Sunday morning. If you would like to talk with someone first, you are welcome to call the church."
        - question: "Where should I go when I arrive?"
          answer: "Come to 6 Haggerty Rd in Charlton. People will be glad to point you toward coffee, discipleship, worship, or a place to sit."
        - question: "Is parking available?"
          answer: "Parking is available near the building. If you are unsure where to enter, someone will be glad to point you in."
    - eyebrow: "What to expect"
      title: "A warm morning centered on Jesus"
      questions:
        - question: "What should I expect when I visit for the first time?"
