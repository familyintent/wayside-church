# Update this page to serve seekers, first-time guests, and people new to faith.
startHere:
  eyebrow: "Start here"
  title: "A place to begin, even if you are not sure what you believe."
  intro: "If you are curious about Jesus, carrying questions, returning to church, or looking for a place where your family can grow in faith, this page is for you."
  primaryCta:
    label: "Plan a Visit"
    href: "/plan-a-visit/"
  secondaryCta:
    label: "Watch Teaching"
    href: "/#latest-teaching"
  pathway:
    eyebrow: "A simple path"
    title: "Take one faithful step"
    body: "You do not need to fill anything out or make a commitment before visiting. You can simply see what Sunday is like, watch a teaching first, or read what to expect."
    steps:
      - title: "Come and see"
        body: "Join a Sunday gathering, listen, observe, sing if you want, and meet a few people at your own pace."
        cta: "Plan a Visit"
        href: "/plan-a-visit/"
      - title: "Watch before you visit"
        body: "Hear a recent teaching and get a feel for how Scripture points us to the hope and life of Jesus Christ."
        cta: "Watch Teaching"
        href: "/#latest-teaching"
      - title: "Know what to expect"
        body: "Check the basics: service time, address, family expectations, what to wear, and answers to common guest questions."
        cta: "Visitor FAQ"
        href: "/contact/#faq"
  sunday:
    eyebrow: "What Sunday feels like"
    title: "Warm, simple, and centered on Jesus"
    body: "A Sunday at Wayside includes Scripture, prayer, worship, fellowship, and people glad to welcome you without pressure."
    rhythm:
      - time: "9:00 AM"
        title: "Coffee and Discipleship"
        body: "Arrive early for coffee, conversation, and a slower entry into community."
      - time: "10:00 AM"
        title: "Sunday Worship"
        body: "We worship Jesus, open the Bible, pray, and make room for families and guests."
      - time: "After Worship"
        title: "Stay if you would like"
        body: "You can leave quietly, meet someone, or linger for conversation. No pressure."
  questions:
    eyebrow: "Honest questions"
    title: "Questions are welcome here"
    intro: "Faith often begins with honest questions. You do not have to pretend, perform, or have everything settled before you come."
    items:
      - question: "Can I come if I am not a Christian?"
        answer: "Yes. You are welcome to attend, listen, ask questions, and take your time. We believe Jesus meets people with truth and grace."
      - question: "What if church has been difficult for me?"
        answer: "We are sorry for places where church has been painful. You are welcome to move slowly, ask careful questions, and get to know people at your own pace."
      - question: "Where should I start if I want to learn about Jesus?"
        answer: "A good first step is to attend Sunday worship, watch a recent teaching, or ask someone to read one of the Gospels with you."
      - question: "Can someone pray with me?"
        answer: "Yes. Most people ask in person or by phone. We would be honored to pray with you when you visit or talk with someone from Wayside."

# Update this page to help guests make a clear Sunday plan.
planVisit:
  eyebrow: "Plan a visit"
  title: "Join us this Sunday"
  intro: "Sunday Worship begins at 10:00 AM, with Coffee and Discipleship at 9:00 AM. Come as you are, bring your questions, and take the morning at your own pace."
  arrival:
    eyebrow: "Before you arrive"
    title: "The basics are simple"
    items:
      - title: "Time"
        body: "Coffee and Discipleship begins at 9:00 AM, and Sunday Worship begins at 10:00 AM."
      - title: "Place"
        body: "Wayside Church gathers at 6 Haggerty Rd in Charlton, Massachusetts."
      - title: "Pace"
        body: "You can listen, observe, sing if you would like, and leave quietly or stay to meet people afterward."
  whatToExpect:
    eyebrow: "What to expect"
    title: "A warm morning centered on Jesus"
    body: "You will find Scripture, worship, prayer, fellowship, and real people glad to welcome guests without pressure."
    items:
      - title: "No dress code"
        body: "Some people dress casually and some dress more formally. Come in what feels normal for you."
      - title: "Families are welcome"
        body: "Children and youth are welcomed into the life of the church as we worship, learn, and grow together."
      - title: "Honest questions fit here"
        body: "You do not need to have everything figured out before you visit."

about:
  hero:
    eyebrow: "About Wayside"
    image: "/images/wayside-community.jpg"
    imageAlt: "Wayside Church family sharing a meal together"
    caption: "Warm fellowship, Scripture, prayer, and practical care shape our life together."
    cards:
      - label: "Sunday Worship"
        value: "10:00 AM"
      - label: "Coffee and Discipleship"
        value: "9:00 AM"
  title: "We are about Jesus Christ"
  intro: "Jesus is the most significant person in history and is profoundly relevant to our lives today. His life, death, and resurrection changed the world and brought hope to the people around us."
  markers:
    - title: "Jesus at the center"
      body: "Our worship, teaching, care, and mission begin with the life, death, resurrection, and return of Jesus Christ."
    - title: "Scripture in the room"
      body: "We open the Bible together and expect God's Word to shape how we pray, serve, repent, and grow."
    - title: "Life together"
      body: "Wayside is a church family where people are known, welcomed, encouraged, and challenged to follow Jesus."
  fiveFold:
    title: "We embrace the five-fold ministry established by Jesus"
    body: "We embrace the ministry of Jesus: reconciling the lost to God, healing the sick and broken, preaching and teaching the Gospel, delivering people from spiritual bondage, and embodying a life of servanthood and humility."
    items:
      - title: "Reconcile"
        body: "Welcoming people into restored relationship with God through Jesus."
      - title: "Heal"
        body: "Praying for the sick and caring for the wounded and broken."
      - title: "Teach"
        body: "Proclaiming the Gospel and grounding disciples in Scripture."
      - title: "Freedom"
        body: "Helping people stand firm against spiritual bondage."
      - title: "Serve"
        body: "Practicing humility, hospitality, and everyday faithfulness."
  gospel:
    title: "We proclaim the Gospel of Jesus"
    body: "We are a community dedicated to seeing individuals, families, communities, and cities radically transformed by the Gospel of Jesus Christ through one Gospel-centered church at a time."
  leadersIntro: "Our leaders are here to shepherd, teach, pray, and help people take their next faithful step with Jesus."
  leaders:
    - name: "Chase Mendoza"
      role: "Pastor"
      image: "/images/chase-mendoza.jpg"
      bio: "Chase is a West Coast native who moved East to attend the Berkshire Institute for Christian Studies in Lenox, Massachusetts. After graduating from BICS, he pursued further theological training through the Antioch School of Church Planting and Leadership Development. Pastor Chase and his family joined Wayside Church to revitalize this local community in 2019."
    - name: "Owen Rushing"
      role: "Ministry Leader"
      image: "/images/owen-rushing.jpg"
      bio: "Owen Rushing was born in Laconia, New Hampshire. In high school, he joined the U.S. Army Reserve and served for nine years. In 2022, he attended a gap-year Christian school program at Berkshire Institute for Christian Studies."
  beliefs:
    - title: "The Gospel and Teaching"
      body: "We hold firm to the Gospel and teachings proclaimed by the Apostles: the Kerygma, meaning proclamation, and the Apostles' Teaching, also called Didache."
    - title: "Advent Christian Declaration of Principles"
      body: "We are part of the Advent Christian denomination and hold to its declaration of principles, including the hope of the return of Jesus Christ."
    - title: "Reformed Emphasis"
      body: "We affirm the five solas of the Reformation: Scripture alone, faith alone, grace alone, Christ alone, and glory to God alone."
    - title: "National Association of Evangelicals"
      body: "As members of the National Association of Evangelicals, we believe in the authority of the Bible, the Trinity, the deity and work of Jesus Christ, the necessity of the Holy Spirit for salvation and godly living, the resurrection of the saved and lost, and the spiritual unity of believers."
  faithIntro: "These convictions keep us rooted as we worship, serve, teach, and live as a local church."
  gatheringNote: "When you join one of our worship gatherings, you may find it a little different than a traditional worship service. We model our gathering around patterns found in the Epistles and the book of Acts."

# Update ministries here.
ministries:
  title: "Life together at Wayside"
  intro: "Ministries at Wayside are simple, relational, and centered on Jesus. They are places to open Scripture, build friendship, pray, serve, and grow at a pace that fits real life."
  welcome:
    eyebrow: "Find your place"
    title: "Start with Sunday, then take one small step into community."
    body: "You do not need to know exactly where you fit before you show up. Come Sunday morning, meet a few people, and let us help you find a simple next step for your season of life."
  pathway:
    eyebrow: "A gentle path"
    title: "Belonging usually begins small"
    steps:
      - title: "Come on Sunday"
        body: "Worship with us at 10:00 AM, or arrive at 9:00 AM for coffee and discipleship."
      - title: "Meet a few people"
        body: "Stay after worship, ask a question, or introduce your family at your own pace."
      - title: "Try a rhythm"
        body: "Join a ministry, midweek group, or discipleship gathering when you are ready."
  rhythm:
    - label: "Sunday morning"
      detail: "Coffee and Discipleship, worship, children, and youth."
    - label: "Sunday evening"
      detail: "Men gather for study, prayer, and encouragement."
    - label: "Wednesday evening"
      detail: "Identity Groups make room for midweek community and discipleship."
  items:
    - name: "Coffee and Discipleship"
      schedule: "Sunday at 9:00 AM"
      audience: "Adults and guests"
      summary: "Coffee, discipleship, warm conversations, and meaningful connections before the main gathering."
      details: "Join us Sunday mornings for coffee and discipleship. It is a simple, welcoming way to deepen fellowship, open Scripture, and build lasting bonds."
    - name: "Men's Spiritual Warfare"
      schedule: "Sunday at 6:00 PM"
      audience: "Men"
      summary: "A gathering for men to study, pray, and stand firm in faith."
      details: "We call men to discuss spiritual warfare, uphold the truth of God's Word, and support one another with courage and humility."
    - name: "Little Disciples"
      schedule: "Sunday at 10:00 AM"
      audience: "Children"
      summary: "Children are welcomed and integrated into the life of the church."
      details: "Little Disciples nurtures faith in children while keeping families connected to the whole congregation."
    - name: "NewLife Youth Ministry"
      schedule: "Sunday at 10:00 AM"
      audience: "Youth"
      summary: "Youth are invited to engage, grow, and serve alongside the church family."
      details: "NewLife is dedicated to creating a supportive environment where young people can grow in faith, build meaningful relationships, and discover their place in the church."
    - name: "Identity Groups"
      schedule: "Wednesday at 6:00 PM"
      audience: "Church family"
      summary: "Midweek community for discipleship, prayer, and life together."
      details: "Identity Groups create space to grow in our relationship with God, support one another, and practice Gospel-centered community."

contactPage:
  title: "Contact us"
  intro: "Find the address, phone number, Sunday details, and a simple way to save the gathering to your calendar."
  visitCopy: "When you join one of our worship gatherings, you may find it a little different than a traditional worship service. You will find worship, Scripture, prayer, fellowship, and people glad to meet you."
  faq:
    - question: "What should I expect when I visit for the first time?"
      answer: "You will find a warm and welcoming community, worship, Bible teaching, and an atmosphere where you can connect with others. There is usually time for fellowship before and after the gathering."
    - question: "Do I need to dress a certain way?"
      answer: "Come as you are. Some people dress casually, some dress more formally, and our focus is worshiping Jesus together."
    - question: "Can I attend if I am not a Christian?"
      answer: "Absolutely. Wayside welcomes everyone regardless of faith background, and we are glad to answer honest questions."
    - question: "What is the church schedule?"
      answer: "Coffee and Discipleship begins Sundays at 9:00 AM, and Sunday worship begins at 10:00 AM."
    - question: "Can I share a prayer request?"
      answer: "Yes. Call us or talk with one of our leaders on Sunday. We would be honored to pray with you."

givingPage:
  title: "Give to Wayside Church"
  intro: "Giving is one way our church family supports worship, ministry, care, and mission in Charlton and beyond."
  body: "Thank you for supporting worship, care, and ministry through Wayside Church."

newsletterPage:
  title: "Stay connected"
  intro: "Subscribe to receive Wayside updates, announcements, ministry rhythms, and next steps."
